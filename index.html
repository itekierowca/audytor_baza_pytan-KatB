<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><style>
body { background:#0f172a; padding:20px; font-family:monospace; color:white; }
.grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-top:20px; }
</style></head>
<body>
<h3>Test 1 — img z height:120px i object-fit:cover</h3>
<div class="grid" id="g1"></div>
<h3>Test 2 — img wewnątrz div z overflow:hidden i height:120px</h3>
<div class="grid" id="g2"></div>
<h3>Test 3 — background-image CSS</h3>
<div class="grid" id="g3"></div>

<script>
const URL = "https://cdn.e-kierowca.pl/media/image-mobile/Wyklad_1_T1_01_1080x1080_67caf8a2b210e.jpg";

// Test 1
for(let i=0;i<4;i++){
  const img = document.createElement('img');
  img.src = URL;
  img.style.cssText = 'width:100%;height:120px;object-fit:cover;display:block;';
  document.getElementById('g1').appendChild(img);
}

// Test 2
for(let i=0;i<4;i++){
  const wrap = document.createElement('div');
  wrap.style.cssText = 'width:100%;height:120px;overflow:hidden;background:#1e293b;';
  const img = document.createElement('img');
  img.src = URL;
  img.style.cssText = 'width:100%;height:120px;object-fit:cover;display:block;';
  wrap.appendChild(img);
  document.getElementById('g2').appendChild(wrap);
}

// Test 3 — background-image (nie używa img w ogóle)
for(let i=0;i<4;i++){
  const div = document.createElement('div');
  div.style.cssText = `width:100%;height:120px;background-image:url('${URL}');background-size:cover;background-position:center;border-radius:6px;`;
  document.getElementById('g3').appendChild(div);
}
</script>
</body>
</html>
